<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galala University Study Plan Center</title>
  <link rel="stylesheet" href="../styles.css" />
  <script>
    window.location.replace('../../../student-interactive-view.html');
  </script>
</head>
<body>
  <header class="hero">
    <img src="../images/GU-Logo.svg" alt="Galala University logo" class="logo" />
    <div>
      <h1>Galala University Study Plan Center</h1>
      <p class="subtitle">Student View — Browse available faculties and study plans.</p>
    </div>
    <div class="nav"><a href="../admin/index.html">Admin Preview</a></div>
  </header>
  <main>
    <section class="card animated">
      <h2>Browse Subjects</h2>
      <div class="grid">
        <div><label>Faculty</label><select id="college"></select></div>
        <div><label>Program</label><select id="program" disabled></select></div>
        <div><label>Year</label><select id="year" disabled></select></div>
        <div><label>Semester</label><select id="semester" disabled></select></div>
      </div>
    </section>

    <section class="card">
      <h2>Subjects</h2>
      <table>
        <thead><tr><th>Code</th><th>Name</th><th>Credits</th><th>Notes</th></tr></thead>
        <tbody id="subjects"></tbody>
      </table>
    </section>
  </main>
  <script type="module" src="./student.js"></script>
</body>
</html>
