<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Plan Portal - Galala University</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h1 {
            color: #002147;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .breadcrumb {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-size: 14px;
        }

        .breadcrumb a {
            color: #002147;
            text-decoration: none;
            cursor: pointer;
            margin: 0 5px;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .content h2 {
            color: #002147;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .card p {
            font-size: 13px;
            opacity: 0.9;
        }

        .card-code {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 3px;
            display: inline-block;
            font-size: 12px;
            margin-top: 10px;
        }

        .course-list {
            display: grid;
            gap: 20px;
        }

        .course-item {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #002147;
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .course-header h3 {
            color: #002147;
            margin-bottom: 5px;
        }

        .course-code {
            background: #002147;
            color: white;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }

        .course-credits {
            background: #8C1D40;
            color: white;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }

        .course-description {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .course-meta {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: #999;
        }

        .prerequisites {
            background: #fff3cd;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            border-left: 3px solid #ffc107;
        }

        .prerequisites strong {
            color: #856404;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state p {
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #002147;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #002147;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            margin-top: 10px;
        }

        .btn:hover {
            background: #001a35;
        }

        .btn-secondary {
            background: #8C1D40;
        }

        .btn-secondary:hover {
            background: #6a1530;
        }

        .sync-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-size: 12px;
            display: none;
        }

        .sync-indicator.active {
            display: block;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .sync-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #28a745;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Study Plan Portal</h1>
            <p>Galala University - Academic Programs</p>
        </div>

        <div class="breadcrumb" id="breadcrumb">
            <a onclick="showFaculties()">Home</a>
        </div>

        <div class="content" id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading faculties...</p>
            </div>
        </div>
    </div>

    <div class="sync-indicator" id="syncIndicator">
        <span class="sync-dot"></span>
        <span>Syncing data...</span>
    </div>

    <script>
        let allData = {
            faculties: [],
            programs: [],
            years: [],
            semesters: [],
            courses: []
        };

        let currentView = 'faculties';
        let currentSelection = {
            faculty: null,
            program: null,
            year: null,
            semester: null
        };

        // Load data on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadAllData();
            setupAutoSync();
        });

        async function loadAllData() {
            try {
                // Load data from localStorage
                const faculties = JSON.parse(localStorage.getItem('studyPlan_faculties') || '[]');
                const programs = JSON.parse(localStorage.getItem('studyPlan_programs') || '[]');
                const years = JSON.parse(localStorage.getItem('studyPlan_years') || '[]');
                const semesters = JSON.parse(localStorage.getItem('studyPlan_semesters') || '[]');
                const courses = JSON.parse(localStorage.getItem('studyPlan_courses') || '[]');

                allData = {
                    faculties: faculties,
                    programs: programs,
                    years: years,
                    semesters: semesters,
                    courses: courses
                };

                showFaculties();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <p>❌ Error loading data. Please refresh the page.</p>
                    </div>
                `;
            }
        }

        function setupAutoSync() {
            // Check for updates every 5 seconds
            setInterval(() => {
                loadAllData();
            }, 5000);

            // Listen for storage changes (cross-tab sync)
            window.addEventListener('storage', (e) => {
                if (e.key && e.key.includes('studyPlan')) {
                    loadAllData();
                }
            });
        }

        function showFaculties() {
            currentView = 'faculties';
            currentSelection = { faculty: null, program: null, year: null, semester: null };
            updateBreadcrumb();

            const content = document.getElementById('content');
            if (allData.faculties.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <p>📭 No faculties available yet.</p>
                        <p>Please check back later or contact the administrator.</p>
                    </div>
                `;
                return;
            }

            content.innerHTML = `
                <h2>🏢 Select a Faculty</h2>
                <div class="grid">
                    ${allData.faculties.map(faculty => `
                        <div class="card" onclick="showPrograms('${faculty.id}')">
                            <h3>${faculty.name}</h3>
                            <p>${faculty.description || 'Faculty of studies'}</p>
                            <div class="card-code">${faculty.code}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function showPrograms(facultyId) {
            currentSelection.faculty = facultyId;
            currentView = 'programs';
            updateBreadcrumb();

            const faculty = allData.faculties.find(f => f.id === facultyId);
            const programs = allData.programs.filter(p => p.facultyId === facultyId);

            const content = document.getElementById('content');
            if (programs.length === 0) {
                content.innerHTML = `
                    <h2>${faculty.name}</h2>
                    <div class="empty-state">
                        <p>📭 No programs available for this faculty yet.</p>
                    </div>
                `;
                return;
            }

            content.innerHTML = `
                <h2>${faculty.name} - Programs</h2>
                <div class="grid">
                    ${programs.map(program => `
                        <div class="card" onclick="showYears('${program.id}')">
                            <h3>${program.name}</h3>
                            <p>${program.description || 'Academic program'}</p>
                            <div class="card-code">${program.code} • ${program.duration} years</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function showYears(programId) {
            currentSelection.program = programId;
            currentView = 'years';
            updateBreadcrumb();

            const program = allData.programs.find(p => p.id === programId);
            const years = allData.years.filter(y => y.programId === programId);

            const content = document.getElementById('content');
            if (years.length === 0) {
                content.innerHTML = `
                    <h2>${program.name} - Years</h2>
                    <div class="empty-state">
                        <p>📭 No years available for this program yet.</p>
                    </div>
                `;
                return;
            }

            content.innerHTML = `
                <h2>${program.name} - Academic Years</h2>
                <div class="grid">
                    ${years.map(year => `
                        <div class="card" onclick="showSemesters('${year.id}')">
                            <h3>Year ${year.yearNumber}</h3>
                            <p>${year.description || 'Academic year'}</p>
                            <div class="card-code">Year ${year.yearNumber}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function showSemesters(yearId) {
            currentSelection.year = yearId;
            currentView = 'semesters';
            updateBreadcrumb();

            const year = allData.years.find(y => y.id === yearId);
            const semesters = allData.semesters.filter(s => s.yearId === yearId);

            const content = document.getElementById('content');
            if (semesters.length === 0) {
                content.innerHTML = `
                    <h2>Year ${year.yearNumber} - Semesters</h2>
                    <div class="empty-state">
                        <p>📭 No semesters available for this year yet.</p>
                    </div>
                `;
                return;
            }

            content.innerHTML = `
                <h2>Year ${year.yearNumber} - Semesters</h2>
                <div class="grid">
                    ${semesters.map(semester => `
                        <div class="card" onclick="showCourses('${semester.id}')">
                            <h3>Semester ${semester.semesterNumber}</h3>
                            <p>${semester.description || 'Semester'}</p>
                            <div class="card-code">${semester.startDate || 'N/A'}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function showCourses(semesterId) {
            currentSelection.semester = semesterId;
            currentView = 'courses';
            updateBreadcrumb();

            const semester = allData.semesters.find(s => s.id === semesterId);
            const courses = allData.courses.filter(c => c.semesterId === semesterId);

            const content = document.getElementById('content');
            if (courses.length === 0) {
                content.innerHTML = `
                    <h2>Semester ${semester.semesterNumber} - Courses</h2>
                    <div class="empty-state">
                        <p>📭 No courses available for this semester yet.</p>
                    </div>
                `;
                return;
            }

            content.innerHTML = `
                <h2>Semester ${semester.semesterNumber} - Courses</h2>
                <div class="course-list">
                    ${courses.map(course => `
                        <div class="course-item">
                            <div class="course-header">
                                <div>
                                    <h3>${course.name}</h3>
                                    <div class="course-meta">
                                        <span class="course-code">${course.code}</span>
                                        <span class="course-credits">${course.credits} Credits</span>
                                    </div>
                                </div>
                            </div>
                            <p class="course-description">${course.description || 'No description'}</p>
                            ${course.prerequisites && course.prerequisites.length > 0 ? `
                                <div class="prerequisites">
                                    <strong>📋 Prerequisites:</strong> ${course.prerequisites.join(', ')}
                                </div>
                            ` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function updateBreadcrumb() {
            let breadcrumbHTML = '<a onclick="showFaculties()">🏠 Home</a>';

            if (currentSelection.faculty) {
                const faculty = allData.faculties.find(f => f.id === currentSelection.faculty);
                breadcrumbHTML += ` > <a onclick="showPrograms('${currentSelection.faculty}')">${faculty.name}</a>`;
            }

            if (currentSelection.program) {
                const program = allData.programs.find(p => p.id === currentSelection.program);
                breadcrumbHTML += ` > <a onclick="showYears('${currentSelection.program}')">${program.name}</a>`;
            }

            if (currentSelection.year) {
                const year = allData.years.find(y => y.id === currentSelection.year);
                breadcrumbHTML += ` > <a onclick="showSemesters('${currentSelection.year}')">Year ${year.yearNumber}</a>`;
            }

            if (currentSelection.semester) {
                const semester = allData.semesters.find(s => s.id === currentSelection.semester);
                breadcrumbHTML += ` > <span>Semester ${semester.semesterNumber}</span>`;
            }

            document.getElementById('breadcrumb').innerHTML = breadcrumbHTML;
        }
    </script>
</body>
</html>
